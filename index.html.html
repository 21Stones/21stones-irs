<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21 Stones Tax & Accounting</title>


<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --deep:#07111F;
  --navy:#0D1D35;
  --mid:#142B4E;
  --panel:#182F54;
  --gold:#C9A84C;
  --gold2:#E8C96A;
  --gold3:#F5E9C8;
  --text:#E8EDF5;
  --text2:#A8B8CC;
  --text3:#6A7D94;
  --border:rgba(201,168,76,0.18);
  --border2:rgba(201,168,76,0.32);
  --card:rgba(20,43,78,0.7);
  --success:#4CAF80;
  --warn:#E8A84C;
  --danger:#E24B4A;
  --radius:10px;
  --radius2:14px;
}
html,body{height:100%;overflow:hidden;background:var(--deep);color:var(--text);font-family:'DM Sans','Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:14px}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:'DM Sans','Segoe UI','Helvetica Neue',Arial,sans-serif}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:4px}

/* LAYOUT */
#app{flex-direction:column;height:100vh}
.topbar{
  background:var(--navy);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  position:relative;z-index:100;
}
.logo{
  font-family:'Playfair Display',Georgia,'Times New Roman',serif;
  font-size:20px;font-weight:700;
  color:var(--gold);
  letter-spacing:1px;
  display:flex;align-items:center;gap:10px;
}
.logo-gem{
  width:28px;height:28px;
  background:linear-gradient(135deg,var(--gold),#8B5E20);
  clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);
  flex-shrink:0;
}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;font-weight:400;font-family:'DM Sans','Segoe UI','Helvetica Neue',Arial,sans-serif;margin-top:1px;display:block}
.topbar-right{display:flex;align-items:center;gap:12px}
.lang-btn{
  background:transparent;border:1px solid var(--border);
  border-radius:20px;padding:5px 14px;
  font-size:11px;color:var(--gold);cursor:pointer;
  letter-spacing:1px;transition:all .2s;
}
.lang-btn:hover{background:var(--gold);color:var(--deep);border-color:var(--gold)}
.notif-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--mid);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:all .2s;
}
.notif-btn:hover{border-color:var(--gold)}
.notif-dot{
  position:absolute;top:6px;right:6px;
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);border:1.5px solid var(--navy);
}
.avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),#7A4A10);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:var(--deep);cursor:pointer;
}

/* BODY LAYOUT */
.body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--navy);
  border-right:1px solid var(--border);
  overflow-y:auto;
  display:flex;flex-direction:column;
  transition:width .3s;
}
.sidebar-top{padding:20px 16px 8px}
.sidebar-user{
  background:var(--mid);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px;
  display:flex;align-items:center;gap:10px;margin-bottom:4px;
}
.user-info .name{font-size:13px;font-weight:500;color:var(--text)}
.user-info .role{font-size:10px;color:var(--gold);letter-spacing:.5px}
.nav-section-label{
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--text3);padding:14px 16px 5px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;margin:1px 8px;
  border-radius:8px;cursor:pointer;
  border-left:2.5px solid transparent;
  transition:all .2s;color:var(--text2);font-size:13px;
}
.nav-item:hover{background:rgba(201,168,76,0.06);color:var(--text)}
.nav-item.active{
  background:rgba(201,168,76,0.1);
  color:var(--gold);
  border-left-color:var(--gold);
}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.8}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{
  margin-left:auto;font-size:9px;
  background:rgba(201,168,76,0.2);color:var(--gold);
  padding:2px 7px;border-radius:10px;font-weight:500;
}
.sidebar-bottom{margin-top:auto;padding:12px 8px}
.upgrade-card{
  background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:14px;text-align:center;
}
.upgrade-card p{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.upgrade-btn{
  background:var(--gold);color:var(--deep);
  border:none;border-radius:6px;padding:7px 16px;
  font-size:11px;font-weight:600;cursor:pointer;width:100%;
  transition:background .2s;
}
.upgrade-btn:hover{background:var(--gold2)}

/* MAIN CONTENT */
.main{flex:1;overflow:auto;background:var(--deep);position:relative}
.page{display:none;padding:28px;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}
.page-title{font-family:'Playfair Display',Georgia,'Times New Roman',serif;font-size:26px;font-weight:600;color:var(--text)}
.page-sub{font-size:12px;color:var(--text3);margin-top:3px;letter-spacing:.3px}
.btn-primary{
  background:var(--gold);color:var(--deep);
  border:none;border-radius:8px;padding:10px 20px;
  font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:7px;
  transition:all .2s;white-space:nowrap;
}
.btn-primary:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-secondary{
  background:transparent;color:var(--text2);
  border:1px solid var(--border);border-radius:8px;padding:9px 16px;
  font-size:13px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}

/* CARDS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius2);
  padding:20px;
  backdrop-filter:blur(8px);
}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--text3)}
.card-action{font-size:11px;color:var(--gold);cursor:pointer;background:none;border:none;padding:0}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius2);padding:18px;
  position:relative;overflow:hidden;
  transition:transform .2s,border-color .2s;cursor:default;
}
.kpi:hover{transform:translateY(-2px);border-color:var(--border2)}
.kpi::after{
  content:'';position:absolute;top:0;right:0;
  width:60px;height:60px;
  background:radial-gradient(circle,rgba(201,168,76,0.08),transparent 70%);
}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:10px}
.kpi-value{font-family:'Playfair Display',Georgia,'Times New Roman',serif;font-size:26px;font-weight:600;color:var(--text);line-height:1}
.kpi-delta{font-size:11px;margin-top:7px;display:flex;align-items:center;gap:4px}
.kpi-delta.pos{color:var(--success)}
.kpi-delta.neg{color:var(--danger)}
.kpi-delta.neu{color:var(--gold)}

/* GRID LAYOUTS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.grid-6040{display:grid;grid-template-columns:60% 1fr;gap:16px;margin-bottom:20px}

/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  font-size:10px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text3);padding:8px 12px;text-align:left;
  border-bottom:1px solid var(--border);
}
tbody td{
  padding:11px 12px;font-size:13px;color:var(--text);
  border-bottom:1px solid rgba(201,168,76,0.06);
}
tbody tr:hover td{background:rgba(201,168,76,0.03)}
tbody tr:last-child td{border-bottom:none}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:500;letter-spacing:.3px}
.badge-success{background:rgba(76,175,128,0.15);color:#4CAF80}
.badge-warn{background:rgba(232,168,76,0.15);color:#E8A84C}
.badge-danger{background:rgba(226,75,74,0.15);color:#E24B4A}
.badge-gold{background:rgba(201,168,76,0.15);color:var(--gold)}
.badge-info{background:rgba(56,138,221,0.15);color:#6EB4F5}

/* PROGRESS */
.prog-wrap{margin-bottom:14px}
.prog-header{display:flex;justify-content:space-between;margin-bottom:5px}
.prog-name{font-size:12px;color:var(--text)}
.prog-pct{font-size:12px;color:var(--gold);font-weight:500}
.prog-bg{height:5px;background:rgba(255,255,255,0.07);border-radius:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 1s ease}

/* CATEGORY BARS */
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-label{font-size:12px;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-bar-bg{flex:2;height:4px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.cat-fill{height:100%;border-radius:4px}
.cat-amt{font-size:12px;color:var(--text2);min-width:58px;text-align:right;font-variant-numeric:tabular-nums}

/* SECURITY */
.sec-row{
  display:flex;align-items:center;gap:12px;
  padding:11px;background:rgba(255,255,255,0.025);
  border-radius:8px;border:1px solid rgba(201,168,76,0.08);
  margin-bottom:9px;transition:border-color .2s;
}
.sec-row:hover{border-color:var(--border)}
.sec-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.sec-text{flex:1}
.sec-name{font-size:12px;color:var(--text);font-weight:500}
.sec-desc{font-size:10px;color:var(--text3);margin-top:1px}
.sec-status{font-size:11px;font-weight:500;white-space:nowrap}

/* INCOME/EXPENSE FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3)}
.form-input{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;
  color:var(--text);font-size:13px;
  transition:border-color .2s;
}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--navy);color:var(--text)}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{
  padding:9px 18px;font-size:12px;color:var(--text3);
  cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all .2s;letter-spacing:.3px;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* OCR UPLOAD */
.upload-zone{
  border:2px dashed var(--border);border-radius:var(--radius2);
  padding:32px;text-align:center;cursor:pointer;
  transition:all .25s;background:rgba(201,168,76,0.02);
}
.upload-zone:hover{border-color:var(--gold);background:rgba(201,168,76,0.05)}
.upload-icon{font-size:32px;margin-bottom:10px;display:block}
.upload-label{font-size:13px;color:var(--text2)}
.upload-sub{font-size:11px;color:var(--text3);margin-top:4px}
#file-input{display:none}

/* RECEIPT CARDS */
.receipt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.receipt-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
  cursor:pointer;transition:all .2s;
}
.receipt-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.receipt-thumb{
  width:100%;height:70px;background:rgba(255,255,255,0.04);
  border-radius:6px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;border:1px solid rgba(255,255,255,0.06);
}
.receipt-merchant{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px}
.receipt-amount{font-family:'Playfair Display',Georgia,'Times New Roman',serif;font-size:18px;color:var(--gold);margin-bottom:3px}
.receipt-date{font-size:10px;color:var(--text3)}
.receipt-cat{font-size:10px;margin-top:6px}

/* DEPRECIATION */
.asset-row{
  display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 80px;
  align-items:center;gap:8px;padding:12px;
  background:rgba(255,255,255,0.02);border-radius:8px;
  border:1px solid rgba(201,168,76,0.06);margin-bottom:8px;
  transition:border-color .2s;
}
.asset-row:hover{border-color:var(--border)}
.asset-name{font-size:13px;color:var(--text);font-weight:500}
.asset-sub{font-size:10px;color:var(--text3);margin-top:1px}
.depr-bar-wrap{display:flex;align-items:center;gap:8px}
.depr-bar-bg{flex:1;height:4px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.depr-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#5DCAA5,#1D9E75)}
.cell-num{font-size:12px;color:var(--text);font-variant-numeric:tabular-nums;text-align:right}
.cell-lbl{font-size:10px;color:var(--text3)}

/* SCHEDULE C */
.sch-section{margin-bottom:20px}
.sch-section-title{
  font-size:10px;text-transform:uppercase;letter-spacing:2px;
  color:var(--gold);padding:8px 12px;
  background:rgba(201,168,76,0.06);
  border-left:2px solid var(--gold);margin-bottom:2px;
  border-radius:0 6px 6px 0;
}
.sch-line{
  display:flex;align-items:center;
  padding:9px 12px;border-bottom:1px solid rgba(201,168,76,0.05);
  transition:background .15s;
}
.sch-line:hover{background:rgba(201,168,76,0.03)}
.sch-line-num{font-size:10px;color:var(--text3);width:24px;flex-shrink:0}
.sch-line-name{flex:1;font-size:12px;color:var(--text)}
.sch-line-amt{font-size:13px;color:var(--text);font-variant-numeric:tabular-nums;font-family:'Playfair Display',Georgia,'Times New Roman',serif;min-width:90px;text-align:right}
.sch-line.total{background:rgba(201,168,76,0.08);border-radius:6px;border:none;margin-top:4px}
.sch-line.total .sch-line-name{font-weight:500;color:var(--gold)}
.sch-line.total .sch-line-amt{color:var(--gold);font-size:15px}

/* CHARTS (pure CSS/SVG) */
.mini-chart{position:relative;height:80px;margin-top:8px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:70px}
.chart-bar{
  flex:1;border-radius:3px 3px 0 0;
  background:rgba(201,168,76,0.25);
  transition:height .6s ease, background .2s;
  cursor:pointer;
}
.chart-bar:hover{background:rgba(201,168,76,0.6)}
.chart-bar.highlight{background:var(--gold)}
.chart-labels{display:flex;gap:4px;margin-top:4px}
.chart-label{flex:1;font-size:9px;color:var(--text3);text-align:center}

/* BANK CONNECT */
.bank-card{
  display:flex;align-items:center;gap:14px;
  padding:14px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:10px;cursor:pointer;transition:all .2s;
}
.bank-card:hover{border-color:var(--gold);transform:translateX(3px)}
.bank-logo{
  width:42px;height:42px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.bank-name{font-size:13px;font-weight:500;color:var(--text)}
.bank-acc{font-size:11px;color:var(--text3);margin-top:2px}
.bank-status{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MOBILE MOCK */
.mobile-frame{
  width:280px;flex-shrink:0;
  background:var(--navy);
  border-left:1px solid var(--border);
  padding:16px;overflow-y:auto;
}
.mobile-header{text-align:center;margin-bottom:16px}
.mobile-title{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase}
.mobile-screen{
  background:var(--deep);border-radius:16px;
  border:1px solid var(--border);padding:14px;
  min-height:300px;
}

/* SETTINGS */
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid rgba(201,168,76,0.06);
}
.settings-label{font-size:13px;color:var(--text)}
.settings-desc{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{
  width:38px;height:20px;background:rgba(255,255,255,0.1);
  border-radius:10px;position:relative;cursor:pointer;
  transition:background .25s;border:1px solid var(--border);
}
.toggle.on{background:var(--gold)}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:14px;height:14px;border-radius:50%;
  background:white;transition:left .25s;
}
.toggle.on::after{left:20px}

/* NOTIFICATIONS PANEL */
.notif-panel{
  position:absolute;top:56px;right:12px;
  width:300px;background:var(--navy);
  border:1px solid var(--border);border-radius:var(--radius2);
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  z-index:200;display:none;
  animation:slideDown .2s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.notif-panel.open{display:block}
.notif-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-title{font-size:13px;font-weight:500}
.notif-clear{font-size:11px;color:var(--gold);cursor:pointer;background:none;border:none}
.notif-item{
  padding:12px 16px;border-bottom:1px solid rgba(201,168,76,0.05);
  cursor:pointer;transition:background .15s;
}
.notif-item:hover{background:rgba(201,168,76,0.04)}
.notif-item-title{font-size:12px;color:var(--text);font-weight:500}
.notif-item-desc{font-size:11px;color:var(--text3);margin-top:2px}
.notif-time{font-size:10px;color:var(--text3);margin-top:4px}
.notif-dot2{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}

/* TOAST */
.toast{
  position:fixed;bottom:20px;right:20px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 18px;
  font-size:13px;color:var(--text);
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  display:flex;align-items:center;gap:10px;
  transform:translateY(80px);opacity:0;
  transition:all .3s ease;z-index:999;
}
.toast.show{transform:translateY(0);opacity:1}
.toast-icon{font-size:16px}
.toast-close{margin-left:12px;cursor:pointer;color:var(--text3);background:none;border:none;font-size:16px}

/* MODAL */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  z-index:500;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-bg.open{display:flex}
.modal{
  background:var(--navy);border:1px solid var(--border);
  border-radius:var(--radius2);padding:28px;
  width:480px;max-width:90vw;
  animation:fadeIn .25s ease;
}
.modal-title{font-family:'Playfair Display',Georgia,'Times New Roman',serif;font-size:20px;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:22px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

/* BOTTOM STATUS BAR */
.status-bar{
  height:32px;background:var(--navy);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:24px;flex-shrink:0;
}
.status-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3)}
.status-item span{color:var(--gold)}

/* RESPONSIVE */
@media(max-width:1100px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  .receipt-grid{grid-template-columns:repeat(2,1fr)}
}

/* ===== AUTH SCREEN ===== */
#authScreen{
  position:fixed;inset:0;z-index:9999;
  background:var(--deep);
  display:flex;align-items:center;justify-content:center;
  overflow:auto;
}
.auth-wrap{
  width:100%;max-width:440px;padding:24px;
  animation:fadeIn .4s ease;
}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-gem{
  width:48px;height:48px;margin:0 auto 12px;
  background:linear-gradient(135deg,var(--gold),#8B5E20);
  clip-path:polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%);
}
.auth-brand{font-family:'Playfair Display',Georgia,'Times New Roman',serif;font-size:26px;font-weight:700;color:var(--gold);letter-spacing:1px}
.auth-brand-sub{font-size:11px;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}
.auth-card{
  background:var(--navy);
  border:1px solid var(--border);
  border-radius:18px;padding:32px;
}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:26px}
.auth-tab{
  flex:1;text-align:center;padding:10px;font-size:13px;
  color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;
}
.auth-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.auth-form{display:none}
.auth-form.active{display:block}
.auth-field{margin-bottom:16px}
.auth-label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:6px}
.auth-input{
  width:100%;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:9px;
  padding:11px 14px;color:var(--text);font-size:14px;
  transition:border-color .2s;
}
.auth-input:focus{outline:none;border-color:var(--gold)}
.auth-input::placeholder{color:var(--text3)}
.auth-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.auth-btn{
  width:100%;background:var(--gold);color:var(--deep);
  border:none;border-radius:9px;padding:13px;
  font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;
  transition:all .2s;letter-spacing:.3px;
}
.auth-btn:hover{background:var(--gold2);transform:translateY(-1px)}
.auth-error{
  background:rgba(226,75,74,0.12);border:1px solid rgba(226,75,74,0.3);
  border-radius:8px;padding:10px 14px;font-size:12px;color:#F09595;
  margin-bottom:14px;display:none;
}
.auth-footer{text-align:center;font-size:11px;color:var(--text3);margin-top:18px;line-height:1.7}
.auth-security{
  display:flex;align-items:center;justify-content:center;gap:16px;
  margin-top:20px;
}
.auth-sec-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.auth-sec-dot{width:5px;height:5px;border-radius:50%;background:var(--success)}

/* USER MENU DROPDOWN */
.user-menu{
  position:absolute;top:56px;right:12px;
  width:220px;background:var(--navy);
  border:1px solid var(--border);border-radius:var(--radius2);
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  z-index:200;display:none;
  animation:slideDown .2s ease;
}
.user-menu.open{display:block}
.user-menu-head{padding:14px 16px;border-bottom:1px solid var(--border)}
.user-menu-name{font-size:13px;font-weight:500;color:var(--text)}
.user-menu-email{font-size:11px;color:var(--text3);margin-top:2px;word-break:break-all}
.user-menu-item{
  padding:10px 16px;font-size:13px;color:var(--text2);
  cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:background .15s;
}
.user-menu-item:hover{background:rgba(201,168,76,0.06);color:var(--text)}
.user-menu-item.danger{color:#F09595}
.user-menu-item.danger:hover{background:rgba(226,75,74,0.08)}

</head>

const MACRS_5 = [0.2,0.32,0.192,0.1152,0.1152,0.0576];
const MACRS_7 = [0.1429,0.2449,0.1749,0.1249,0.0893,0.0892,0.0893,0.0446];

function calcDepr(asset){
  const table = asset.life === 5 ? MACRS_5 : asset.life === 7 ? MACRS_7 : null;
  if(!table) return {yr:0, accum:0, book:asset.cost};
  const currentYear = 2025;
  const idx = currentYear - asset.year;
  const yrRate = (idx >= 0 && idx < table.length) ? table[idx] : 0;
  const yr = Math.round(asset.cost * yrRate);
  let accum = 0;
  for(let i=0; i<Math.min(idx+1,table.length); i++) accum += asset.cost * table[i];
  accum = Math.round(accum);
  return {yr, accum, book: asset.cost - accum};
}

function updateChart(type){
  document.getElementById('mainChart').dataset.type = type;

}

function renderChart(type='revenue'){
  const data = chartData[type];
  const labels = chartData.labels;
  const max = Math.max(...data);
  const bars = document.getElementById('mainChart');
  const lbls = document.getElementById('chartLabels');
  const cur = new Date().getMonth();
  bars.innerHTML = data.map((v,i)=>{
    const h = Math.round((v/max)*65);
    const cls = i===cur?'chart-bar highlight':'chart-bar';
    return `<div class="${cls}" style="height:${h}px" title="${labels[i]}: $${v.toLocaleString()}"></div>`;
  }).join('');
  lbls.innerHTML = labels.map(l=>`<div class="chart-label">${l}</div>`).join('');
}

// ===================== AUTH SYSTEM =====================
// Simple localStorage-based multi-user auth (no backend needed)
const USERS_KEY = '21stones_users';
const SESSION_KEY = '21stones_session';

function getUsers(){
  try{return JSON.parse(localStorage.getItem(USERS_KEY)||'[]')}catch(e){return[]}
}
function saveUsers(u){localStorage.setItem(USERS_KEY,JSON.stringify(u))}
function getSession(){
  try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch(e){return null}
}
function saveSession(u){localStorage.setItem(SESSION_KEY,JSON.stringify(u))}
function clearSession(){localStorage.removeItem(SESSION_KEY)}

function initials(name){
  return name.split(' ').map(p=>p[0]||'').join('').toUpperCase().slice(0,2);
}

function switchAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('form-'+tab).classList.add('active');
  document.getElementById('login-error').style.display='none';
  document.getElementById('reg-error').style.display='none';
}

function doLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-error');
  err.style.display='none';
  if(!email||!pass){err.textContent='Please enter email and password.';err.style.display='block';return}
  const users = getUsers();
  const user  = users.find(u=>u.email===email && u.pass===pass);
  if(!user){err.textContent=currentLang==='es'?'Email o contraseña incorrectos.':'Invalid email or password.';err.style.display='block';return}
  saveSession(user);
  enterApp(user);
}

function doRegister(){
  const first = document.getElementById('reg-first').value.trim();
  const last  = document.getElementById('reg-last').value.trim();
  const email = document.getElementById('reg-email').value.trim().toLowerCase();
  const biz   = document.getElementById('reg-biz').value.trim()||first+' Business';
  const type  = document.getElementById('reg-type').value;
  const pass  = document.getElementById('reg-pass').value;
  const err   = document.getElementById('reg-error');
  err.style.display='none';
  if(!first||!last||!email||!pass){err.textContent=currentLang==='es'?'Completa todos los campos requeridos.':'Please fill all required fields.';err.style.display='block';return}
  if(pass.length<6){err.textContent=currentLang==='es'?'La contraseña debe tener al menos 6 caracteres.':'Password must be at least 6 characters.';err.style.display='block';return}
  const users = getUsers();
  if(users.find(u=>u.email===email)){err.textContent=currentLang==='es'?'Ese email ya está registrado.':'Email already registered.';err.style.display='block';return}
  const user={id:Date.now(),firstName:first,lastName:last,name:first+' '+last,email,biz,type,pass,created:new Date().toISOString()};
  users.push(user);
  saveUsers(users);
  saveSession(user);
  enterApp(user);
}

function enterApp(user){
  // Update all UI with user data
  const ini = initials(user.name);
  document.getElementById('topAvatar').textContent = ini;
  document.getElementById('sideAvatar').textContent = ini;
  document.getElementById('sidebarName').textContent = user.name;
  document.getElementById('menu-name').textContent = user.name;
  document.getElementById('menu-email').textContent = user.email;
  if(document.getElementById('filerName')) document.getElementById('filerName').textContent = user.name;
  // Update business type in sidebar role
  const roleEl = document.getElementById('user-role');
  if(roleEl) roleEl.textContent = user.type || 'Self-Employed';
  // Hide auth screen, show app
  document.getElementById('authScreen').style.display='none';
  const appEl=document.getElementById('app');
  appEl.style.display='flex';
  appEl.style.flexDirection='column';
  appEl.style.height='100vh';
  // Personalized welcome toast
  showToast('👋', (currentLang==='es'?'Bienvenido/a, ':'Welcome, ') + user.firstName + '!', '');
}

function doLogout(){
  clearSession();
  closeUserMenu();
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  // Clear login form
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-error').style.display='none';
  showToast('✅',currentLang==='es'?'Sesión cerrada correctamente':'Signed out successfully','');
}

  const m = document.getElementById('userMenu');

}
function closeUserMenu(){
  document.getElementById('userMenu').classList.remove('open');
}

document.addEventListener('click',function(e){
  const menu = document.getElementById('userMenu');
  if(menu.classList.contains('open') && !menu.contains(e.target) && !e.target.closest('#topAvatar')){
    menu.classList.remove('open');

function checkSession(){
  const session = getSession();
  if(session){
    enterApp(session);
  } else {
    // Keep auth screen visible, hide app
    document.getElementById('app').style.display='none';
  }
}
